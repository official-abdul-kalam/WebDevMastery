<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 36: Arrow Functions</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>Arrow Functions</h1>
        <p>Short & Clean Syntax.</p>

        <div class="card">
            <input type="number" id="num1" placeholder="Num 1">
            <input type="number" id="num2" placeholder="Num 2">

            <div class="buttons">
                <button onclick="calculate('add')">+</button>
                <button onclick="calculate('sub')">-</button>
                <button onclick="calculate('mul')">×</button>
            </div>

            <h2 id="result">Result: -</h2>
        </div>
    </div>

    <script src="script.js"></script>
</body>
