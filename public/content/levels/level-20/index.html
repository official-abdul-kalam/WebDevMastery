<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 20: Array Methods</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>Array Methods</h1>
        <p>List me items add/remove karna.</p>

        <div class="card">
            <h3>Shopping Cart 🛒</h3>
            <div class="controls">
                <input type="text" id="itemInput" placeholder="Item name">
                <button onclick="addItem()" class="btn-add">Add</button>
                <button onclick="removeItem()" class="btn-remove">Remove Last</button>
            </div>

            <div id="cartDisplay">Cart is Empty</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
