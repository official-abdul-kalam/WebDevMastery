<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 46 - LocalStorage</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="card">
            <h2>Name Saver (LocalStorage)</h2>
            <p>Enter your name. It will stay here even if you reload the page!</p>

            <div class="input-group">
                <input type="text" id="nameInput" placeholder="Enter your name">
                <button id="saveBtn">Save Name</button>
                <button id="clearBtn" class="secondary">Clear</button>
            </div>

            <div id="greeting" class="hidden">
                <h3>Hello, <span id="savedName"></span>! 👋</h3>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
