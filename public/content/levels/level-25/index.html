<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 25: Removing Elements</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>Removing Elements</h1>
        <p>Click karke elements ko gayab karein.</p>

        <div class="card">
            <p>Click on a circle to remove it!</p>
            <div id="circleContainer" class="circle-container">
                <div class="circle" onclick="removeMe(this)">1</div>
                <div class="circle" onclick="removeMe(this)">2</div>
                <div class="circle" onclick="removeMe(this)">3</div>
                <div class="circle" onclick="removeMe(this)">4</div>
                <div class="circle" onclick="removeMe(this)">5</div>
            </div>

            <button onclick="reset()">Reset</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
