<!-- 
    LEVEL 4: THE BOX MODEL
    
    [ LOGIC: BOX MODEL KYA HAI? ]
    Web design me har cheez ek DABBA (Box) hoti hai.
    Is dabbe ke 3 parts hote hain:
    1. Padding (Andar ki jagah)
    2. Border (Deewar)
    3. Margin (Bahar ki jagah)
-->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- 
        Hum alag alag classes use kar rahe hain taaki fark dekh sakein.
        "box" class sabme common hai (sabka size same hoga).
    -->

    <div class="box">
        Mai ek normal Box hu.
    </div>

    <div class="box box-padding">
        Mere paas PADDING hai!
        (Text aur Border ke beech jagah dekho)
    </div>

    <div class="box box-border">
        Mere paas BORDER hai!
        (Moti hari boundary)
    </div>

    <div class="box box-margin">
        Mere paas MARGIN hai!
        (Mai dusre dabbo se door hu)
    </div>

    <div class="box box-all">
        Mere paas SAB KUCH hai!
    </div>

</body>

</html>
