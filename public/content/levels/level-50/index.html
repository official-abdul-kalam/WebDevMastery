<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 50 - Notification API</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="card">
            <h2>System Notifications 🔔</h2>
            <p>Send a notification to your desktop/mobile.</p>

            <div class="status-indicator">
                Permission: <span id="permStatus">Checking...</span>
            </div>

            <div class="actions">
                <button id="requestBtn">Request Permission</button>
                <button id="notifyBtn" disabled>Send Notification</button>
            </div>

            <p class="note">Note: Notifications might be blocked by "Do Not Disturb" mode.</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
