<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 47 - SessionStorage</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="card">
            <h2>Session Counter</h2>
            <p>This counter remembers your clicks only while this tab is open.</p>

            <div class="counter-display">
                <span id="count">0</span>
            </div>

            <button id="incrementBtn">Increment (+1)</button>

            <p class="note">Close and reopen this tab to see the counter reset!</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
