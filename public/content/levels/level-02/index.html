<!-- 
    LEVEL 2: TEXT FORMATTING
    
    [ HINDI GUIDE ]
    Is level me hum text ko sajana seekhenge.
    Jaise Word me Bold/Italic karte hain, waise hi HTML me tags use karte hain.
-->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Magic</title>

    <!-- 
        [ LINKAGE ]
        Humne 'style.css' ko link kiya hai.
        Agar ye line hata di, to saare rang (colors) gayab ho jayenge.
    -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- 
        HEADINGS (h1 se h6)
        HTML me 6 tarah ki headings hoti hain.
        h1 sabse badi aur important hoti hai.
        h6 sabse choti hoti hai.
    -->
    <h1>Ye Heading 1 hai (Main Title)</h1>
    <h2>Ye Heading 2 hai (Sub Title)</h2>
    <h3>Ye Heading 3 hai (Section Title)</h3>

    <!-- 
        HR TAG (Horizontal Rule)
        Ye page par ek seedhi line kheech deta hai.
        Iska koi closing tag (</hr>) nahi hota.
    -->
    <hr>

    <!-- 
        PARAGRAPHS & FORMATTING
        <b> = Bold (Mota text)
        <i> = Italic (Tircha text)
        <u> = Underline (Neeche line)
    -->
    <p>
        Ye ek normal paragraph hai.
        <b>Ye text BOLD hai.</b>
        <i>Ye text ITALIC hai.</i>
        <u>Ye text UNDERLINED hai.</u>
    </p>

    <p>
        Aap tags ko mix bhi kar sakte hain:
        <!-- Pehle Bold, fir Italic, fir Underline -->
        <b><i><u>Ye teeno hai!</u></i></b>
    </p>

    <!-- 
        BR TAG (Break Row)
        HTML me "Enter" dabane se nayi line nahi aati.
        Hume <br> tag lagana padta hai.
    -->
    <p>
        Ye pehli line hai.<br> <!-- Yaha line tootegi -->
        Ye dusri line hai.
    </p>

</body>

</html>
