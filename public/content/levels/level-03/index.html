<!-- 
    LEVEL 3: COLORS & CLASSES
    
    [ LOGIC: CLASS KYA HAI? ]
    Ab tak hum tags (h1, p) ko style kar rahe the.
    Lekin agar hume 2 alag-alag <div> ko alag design dena ho to?
    Tab hum "class" use karte hain.
    
    Class = Ek naam jo hum kisi bhi element ko de sakte hain.
-->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colors</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- 
        Humne is div ko 2 classes di hain:
        1. "box": Isse box ka shape milega.
        2. "red-box": Isse laal rang milega.
    -->
    <div class="box red-box">
        <h1>Mai Laal hu!</h1>
        <p>Mera background red hai.</p>
    </div>

    <div class="box blue-box">
        <h1>Mai Neela hu!</h1>
        <p>Mera background blue hai.</p>
    </div>

    <div class="box green-box">
        <h1>Mai Hara hu!</h1>
        <p>Mera background green hai.</p>
    </div>

    <div class="box hex-box">
        <h1>Mai Hex Code hu!</h1>
        <p>Mera background #800080 (Purple) hai.</p>
    </div>

</body>

</html>
