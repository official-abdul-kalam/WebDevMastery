<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 13: CSS for Forms</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>Stylish Forms</h1>
        <p>Forms ko sundar banana seekhein.</p>

        <form>
            <div class="input-group">
                <label>Name</label>
                <input type="text" placeholder="Enter your name" class="styled-input">
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="Enter your email" class="styled-input">
            </div>

            <button type="button" class="styled-btn">Sign Up</button>
        </form>

        <div class="note">
            <p>Try clicking inside the inputs to see the <b>:focus</b> effect!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
