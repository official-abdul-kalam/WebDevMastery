<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 48 - Cookies</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="card">
            <h2>Cookie Theme Saver 🍪</h2>
            <p>Select a theme. We'll save it in a cookie for 7 days.</p>

            <div class="theme-options">
                <button class="theme-btn light" data-theme="light">Light Mode ☀️</button>
                <button class="theme-btn dark" data-theme="dark">Dark Mode 🌙</button>
            </div>

            <div class="status-box">
                <p>Current Cookie Value:</p>
                <code id="cookieValue">No cookie set</code>
            </div>

            <button id="clearCookieBtn" class="secondary">Eat Cookie (Clear)</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
