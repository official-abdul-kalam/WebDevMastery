<!DOCTYPE html>
<html lang="en">

<head>

    <title>Level 10: Flexbox Alignment</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>Flexbox Alignment</h1>
        <p>Cheezon ko Center me lana seekhein.</p>

        <!-- Parent Container -->
        <div class="flex-box">
            <div class="item">1</div>
            <div class="item">2</div>
            <div class="item">3</div>
        </div>

        <div class="instructions">
            <h3>Try these in CSS:</h3>
            <p><b>justify-content</b> (Horizontal): <code>center</code>, <code>space-between</code>,
                <code>flex-end</code></p>
            <p><b>align-items</b> (Vertical): <code>center</code>, <code>flex-end</code>, <code>stretch</code></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
