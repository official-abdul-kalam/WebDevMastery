<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 4: Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <div class="form-box">
            <h1>Student Registration</h1>
            <p>Join the Web Dev Mastery Course</p>

            <form onsubmit="return validateForm(event)">

                <!-- Full Name -->
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="fullname" placeholder="John Doe" required>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="john@example.com" required>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="********" required>
                </div>

                <!-- Gender (Radio) -->
                <div class="form-group">
                    <label>Gender</label>
                    <div class="radio-group">
                        <label><input type="radio" name="gender" value="Male"> Male</label>
                        <label><input type="radio" name="gender" value="Female"> Female</label>
                    </div>
                </div>

                <!-- Interests (Checkbox) -->
                <div class="form-group">
                    <label>Interests</label>
                    <div class="checkbox-group">
                        <label><input type="checkbox" value="HTML"> HTML</label>
                        <label><input type="checkbox" value="CSS"> CSS</label>
                        <label><input type="checkbox" value="JS"> JavaScript</label>
                    </div>
                </div>

                <!-- Country (Select) -->
                <div class="form-group">
                    <label>Country</label>
                    <select id="country">
                        <option value="India">India</option>
                        <option value="USA">USA</option>
                        <option value="UK">UK</option>
                    </select>
                </div>

                <!-- Submit Button -->
                <button type="submit">Register Now</button>

            </form>

            <p id="message"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
