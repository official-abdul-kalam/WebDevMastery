<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 17: Typing Test</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>⌨️ Typing Speed Test</h1>

        <div class="stats">
            <p>Time: <span id="time">60</span>s</p>
            <p>WPM: <span id="wpm">0</span></p>
            <p>Mistakes: <span id="mistakes">0</span></p>
        </div>

        <div class="text-box">
            <p id="quote">Click 'Start' to begin...</p>
        </div>

        <textarea id="inputField" placeholder="Start typing here..." disabled></textarea>

        <button id="startBtn" onclick="startGame()">Start Game</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
