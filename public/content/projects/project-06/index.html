<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 6: Simple Calculator</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div class="calculator-card">
        <div class="header">
            <h2><i class="fa-solid fa-calculator"></i> Calculator</h2>
        </div>

        <div class="display">
            <input type="number" id="num1" placeholder="First Number">
            <input type="number" id="num2" placeholder="Second Number">
        </div>

        <div class="buttons-grid">
            <button onclick="calculate('+')" class="btn-op"><i class="fa-solid fa-plus"></i> Add</button>
            <button onclick="calculate('-')" class="btn-op"><i class="fa-solid fa-minus"></i> Sub</button>
            <button onclick="calculate('*')" class="btn-op"><i class="fa-solid fa-xmark"></i> Mul</button>
            <button onclick="calculate('/')" class="btn-op"><i class="fa-solid fa-divide"></i> Div</button>
        </div>

        <div class="result-area">
            <p>Result:</p>
            <h1 id="result">0</h1>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
