<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 19 - Sticky Notes App</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Reenie+Beanie&family=Roboto:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header>
            <h1>Sticky Notes 📝</h1>
            <button id="addNoteBtn">+ Add Note</button>
        </header>

        <div id="notesContainer" class="notes-grid">
            <!-- Notes will be added here dynamically -->
            <p id="emptyMsg" class="empty-msg">No notes yet. Click "+ Add Note" to create one!</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
