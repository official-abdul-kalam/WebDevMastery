<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 10: Stopwatch</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
</head>

<body>

    <div class="stopwatch-card">
        <h2>⏱️ Stopwatch</h2>

        <div class="time-display" id="display">00:00:00</div>

        <div class="buttons">
            <button onclick="startTimer()" class="btn start">Start</button>
            <button onclick="stopTimer()" class="btn stop">Stop</button>
            <button onclick="resetTimer()" class="btn reset">Reset</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
