<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 13: Weather App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div class="container">
        <div class="weather-card">
            <div class="search-box">
                <input type="text" id="cityInput" placeholder="Enter City Name">
                <button onclick="getWeather()"><i class="fa-solid fa-search"></i></button>
            </div>

            <div id="weatherInfo" class="weather-info" style="display: none;">
                <img src="https://cdn-icons-png.flaticon.com/512/1163/1163657.png" class="weather-icon">
                <h1 id="temp">22°C</h1>
                <h2 id="city">New York</h2>

                <div class="details">
                    <div class="col">
                        <i class="fa-solid fa-water"></i>
                        <div>
                            <p id="humidity">50%</p>
                            <p>Humidity</p>
                        </div>
                    </div>
                    <div class="col">
                        <i class="fa-solid fa-wind"></i>
                        <div>
                            <p id="wind">15 km/h</p>
                            <p>Wind Speed</p>
                        </div>
                    </div>
                </div>
            </div>

            <p id="errorMsg" class="error">City not found!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
