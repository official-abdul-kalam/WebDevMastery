<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 5: Survey Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <header>
            <h1>Course Feedback Survey</h1>
            <p>Help us improve Web Dev Mastery</p>
        </header>

        <form id="surveyForm" onsubmit="return submitSurvey(event)">

            <!-- Name -->
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="name" placeholder="Enter your name" required>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>

            <!-- Age -->
            <div class="form-group">
                <label>Age</label>
                <input type="number" id="age" min="10" max="99" placeholder="Age">
            </div>

            <!-- Role (Select) -->
            <div class="form-group">
                <label>Which option best describes you?</label>
                <select id="role">
                    <option value="student">Student</option>
                    <option value="professional">Professional</option>
                    <option value="hobbyist">Hobbyist</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <!-- Recommendation (Radio) -->
            <div class="form-group">
                <label>Would you recommend this course?</label>
                <div class="radio-group">
                    <label><input type="radio" name="recommend" value="yes" checked> Definitely</label>
                    <label><input type="radio" name="recommend" value="maybe"> Maybe</label>
                    <label><input type="radio" name="recommend" value="no"> Not sure</label>
                </div>
            </div>

            <!-- Improvements (Checkbox) -->
            <div class="form-group">
                <label>What would you like to see improved? (Check all that apply)</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" value="projects"> More Projects</label>
                    <label><input type="checkbox" value="videos"> Video Tutorials</label>
                    <label><input type="checkbox" value="challenges"> Daily Challenges</label>
                    <label><input type="checkbox" value="community"> Community Forum</label>
                </div>
            </div>

            <!-- Comments (Textarea) -->
            <div class="form-group">
                <label>Any comments or suggestions?</label>
                <textarea id="comments" placeholder="Enter your comment here..."></textarea>
            </div>

            <!-- Submit -->
            <button type="submit" id="submitBtn">Submit Feedback</button>

        </form>
    </div>

    <script src="script.js"></script>
</body>

</html>
