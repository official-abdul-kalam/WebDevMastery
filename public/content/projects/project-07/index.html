<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 7: To-Do List</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <!-- Navigation Bar (Har page par same rahega) -->
    <nav class="navbar">
        <div class="logo">✅ TaskMaster</div>
        <ul class="nav-links">
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="about.html">About</a></li>
        </ul>
    </nav>

    <div class="container">
        <header>
            <h1>My Tasks</h1>
            <p>Apne kaam ko organize karein.</p>
        </header>

        <div class="todo-card">
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="Add a new task...">
                <button onclick="addTask()"><i class="fa-solid fa-plus"></i></button>
            </div>

            <ul id="taskList">
                <!-- Tasks yahan aayenge (JS se) -->
            </ul>

            <div class="stats">
                <p>Total Tasks: <span id="totalCount">0</span></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
