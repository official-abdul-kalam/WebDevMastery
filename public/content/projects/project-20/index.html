<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 20 - Location Logger</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Roboto:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header>
            <h1>📍 Location Logger</h1>
            <p>Track your check-ins over time.</p>
        </header>

        <div class="controls">
            <button id="checkInBtn" class="primary-btn">Check In Now</button>
            <button id="clearHistoryBtn" class="secondary-btn">Clear History</button>
        </div>

        <div id="statusMsg" class="status hidden"></div>

        <div class="history-container">
            <h3>Check-In History</h3>
            <ul id="historyList">
                <!-- History items will appear here -->
            </ul>
            <p id="emptyMsg" class="empty-msg">No check-ins yet.</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
